version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  node-app:
    image: prasannab2002/node-app:latest
    container_name: node-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo

volumes:
  mongo-data:
